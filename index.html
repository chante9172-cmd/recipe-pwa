<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>食譜轉換器</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="食譜轉換">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --primary:#ff6b35;--primary-dark:#e85a26;--bg:#f8f6f3;--card:#ffffff;
  --text:#2d3436;--text-light:#636e72;--border:#e0dcd8;
  --success:#00b894;--danger:#d63031;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background-size:cover;background-position:center;background-color:var(--bg)}
.auth-logo{font-size:56px;margin-bottom:8px}
.auth-title{font-size:26px;font-weight:700;color:var(--primary);margin-bottom:4px}
.auth-subtitle{font-size:13px;color:var(--text-light);margin-bottom:32px}
.auth-card{background:var(--card);border-radius:var(--radius);padding:24px;width:100%;max-width:380px;box-shadow:var(--shadow)}
.auth-tabs{display:flex;border-radius:10px;background:#f0ece8;padding:4px;margin-bottom:20px;gap:4px}
.auth-tab{flex:1;padding:8px;border:none;border-radius:8px;background:transparent;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;color:var(--text-light);transition:all .2s}
.auth-tab.active{background:white;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.accounts-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;margin-bottom:12px}
.account-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .2s}
.account-item:hover{border-color:var(--primary);background:#fff8f5}
.account-avatar{width:38px;height:38px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px}
.account-name{font-weight:500;font-size:15px;flex:1}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
#app.active{display:flex}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:white;box-shadow:0 1px 0 var(--border);position:sticky;top:0;z-index:100}
.top-bar-title{font-size:17px;font-weight:700;color:var(--primary)}
.user-btn{display:flex;align-items:center;gap:8px;background:#fff8f5;border:1.5px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--text)}
.user-btn .avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.page-content{flex:1;overflow-y:auto;padding-bottom:80px}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;font-family:inherit;gap:3px;position:relative}
.nav-btn .nav-icon{font-size:22px;transition:transform .2s}
.nav-btn .nav-label{font-size:10px;color:var(--text-light);font-weight:500}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-btn.active .nav-label{color:var(--primary);font-weight:700}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--primary);border-radius:2px 2px 0 0}

/* PAGES */
.page{display:none;padding:16px}
.page.active{display:block}

/* CARDS */
.card{background:white;border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* INPUTS */
input,textarea,select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:white;color:var(--text);outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--primary)}
input[type="color"]{padding:4px;height:44px;cursor:pointer}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:10px;border:none;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-danger{background:var(--danger);color:white}
.btn-ghost{background:#f5f5f5;color:var(--text)}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-full{width:100%}
.btn:active{transform:scale(.97)}

/* INGREDIENTS */
.ingredient-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ingredient-row input{flex:3}
.ingredient-row .qty{flex:2}
.ingredient-row select{flex:2;padding:11px 6px}
.del-btn{background:#fee;border:none;border-radius:8px;width:34px;height:44px;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--danger)}

/* STEPS */
.step-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:10px}
.step-row textarea{flex:1;min-height:60px;resize:none}

/* CONVERT */
.convert-tabs{display:flex;background:#f0ece8;border-radius:10px;padding:4px;gap:3px;margin-bottom:16px}
.convert-tab{flex:1;padding:8px 4px;border:none;border-radius:7px;background:transparent;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;color:var(--text-light);transition:all .2s;text-align:center}
.convert-tab.active{background:white;color:var(--primary);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* RESULTS */
.result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.result-row:last-child{border-bottom:none}
.result-name{flex:1;font-weight:500}
.result-orig{color:var(--text-light)}
.result-new{font-weight:700;color:var(--primary);margin-left:12px}
.badge-ref{font-size:10px;background:#d5f5e3;color:var(--success);border-radius:6px;padding:2px 6px;margin-left:6px;font-weight:700}

/* SAVED */
.saved-toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.breadcrumb{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:12px;font-size:13px}
.breadcrumb-item{color:var(--primary);cursor:pointer;font-weight:600}
.breadcrumb-sep{color:var(--text-light)}
.folder-item,.recipe-item{display:flex;align-items:center;gap:12px;background:white;border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:var(--shadow);position:relative}
.folder-icon{font-size:28px}
.recipe-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;background:#f0ece8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.recipe-thumb img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0;cursor:pointer}
.item-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:12px;color:var(--text-light);margin-top:2px}
.item-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{background:#f5f5f5;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

/* COVER */
.cover-area{width:100%;height:160px;border-radius:var(--radius);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:16px;cursor:pointer;background:#f8f6f3;transition:border-color .2s}
.cover-area:hover{border-color:var(--primary)}
.cover-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
.cover-placeholder{font-size:36px;margin-bottom:4px}
.cover-hint{font-size:13px;color:var(--text-light)}

/* SETTINGS */
.settings-section{margin-bottom:20px}
.settings-section-title{font-size:13px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding:0 4px}
.bg-setting-card{background:white;border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.bg-setting-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bg-page-icon{font-size:22px}
.bg-page-name{font-weight:600;font-size:15px}
.bg-type-tabs{display:flex;gap:6px;margin-bottom:12px}
.bg-type-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:white;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;color:var(--text-light);transition:all .2s}
.bg-type-btn.active{border-color:var(--primary);color:var(--primary);background:#fff8f5}
.bg-preview{width:100%;height:60px;border-radius:8px;margin-top:10px;background-size:cover;background-position:center;border:1px solid var(--border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:500}
.modal-overlay.show{display:flex}
.modal{background:white;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions .btn{flex:1}

/* COLLAPSE */
.collapse-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0}
.collapse-arrow{transition:transform .2s;font-size:12px;color:var(--text-light)}
.collapse-arrow.open{transform:rotate(180deg)}
.collapse-body{overflow:hidden;transition:max-height .3s ease}

/* MISC */
.empty-state{text-align:center;padding:48px 24px;color:var(--text-light)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.row{display:flex;gap:10px}
.row>*{flex:1}
.loading{text-align:center;padding:20px;color:var(--text-light);font-size:14px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#2d3436;color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">🍳</div>
  <div class="auth-title">食譜轉換器</div>
  <div class="auth-subtitle">你的私人食譜管理助手</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">登入</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">建立帳號</button>
    </div>
    <div id="login-panel">
      <div id="accounts-list" class="accounts-list"></div>
      <p id="login-or" style="text-align:center;font-size:13px;color:var(--text-light);margin-bottom:12px;display:none">— 或輸入帳號密碼 —</p>
      <div style="margin-bottom:10px"><label>帳號名稱</label><input type="text" id="login-username" placeholder="輸入帳號名稱"></div>
      <div style="margin-bottom:16px"><label>密碼</label><input type="password" id="login-password" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">登入</button>
    </div>
    <div id="register-panel" style="display:none">
      <div style="margin-bottom:10px"><label>帳號名稱（至少2字）</label><input type="text" id="reg-username" placeholder="例如：小明"></div>
      <div style="margin-bottom:16px"><label>密碼（至少4位）</label><input type="password" id="reg-password" placeholder="設定密碼" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">建立帳號</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="top-bar">
    <div class="top-bar-title">🍳 食譜轉換器</div>
    <button class="user-btn" onclick="showLogout()">
      <div class="avatar" id="user-avatar">?</div>
      <span id="user-name-display">使用者</span>
    </button>
  </div>

  <div class="page-content" id="page-content">

    <!-- EDIT PAGE -->
    <div class="page active" id="page-edit">
      <div class="cover-area" id="cover-area" onclick="showCoverModal()">
        <div class="cover-placeholder">🖼️</div>
        <div class="cover-hint">點擊設定封面照片</div>
      </div>
      <div class="card">
        <div class="card-title">食譜資訊</div>
        <div style="margin-bottom:10px"><label>食譜名稱</label><input type="text" id="recipe-name" placeholder="例如：媽媽的紅燒肉"></div>
        <div><label>原始份量（人數）</label><input type="text" id="recipe-servings" placeholder="例如：4 或 1/2"></div>
      </div>
      <div class="card">
        <div class="card-title">食材清單</div>
        <div id="ingredient-list"></div>
        <button class="btn btn-outline btn-full btn-sm" onclick="addIngredient()">＋ 新增食材</button>
      </div>
      <div class="card">
        <div class="collapse-header" onclick="toggleCollapse('steps-body','steps-arrow')">
          <div class="card-title" style="margin-bottom:0">做法步驟</div>
          <span class="collapse-arrow" id="steps-arrow">▼</span>
        </div>
        <div class="collapse-body" id="steps-body" style="max-height:0">
          <div style="height:14px"></div>
          <div id="steps-list"></div>
          <button class="btn btn-outline btn-full btn-sm" onclick="addStep()">＋ 新增步驟</button>
        </div>
      </div>
      <div class="card">
        <div class="collapse-header" onclick="toggleCollapse('notes-body','notes-arrow')">
          <div class="card-title" style="margin-bottom:0">備註</div>
          <span class="collapse-arrow" id="notes-arrow">▼</span>
        </div>
        <div class="collapse-body" id="notes-body" style="max-height:0">
          <div style="height:14px"></div>
          <textarea id="recipe-notes" placeholder="小技巧、注意事項、食材替換建議…" style="min-height:80px;resize:vertical"></textarea>
        </div>
      </div>
      <div class="row">
        <button class="btn btn-ghost" onclick="newRecipe()">🗑 清空</button>
        <button class="btn btn-primary" onclick="saveRecipe()">💾 儲存食譜</button>
      </div>
    </div>

    <!-- CONVERT PAGE -->
    <div class="page" id="page-convert">
      <div id="no-recipe-msg" class="card" style="text-align:center;padding:32px">
        <p style="font-size:32px;margin-bottom:12px">⚖️</p>
        <p style="color:var(--text-light);font-size:14px">請先在「編輯」頁面新增食材，或從「已儲存」載入食譜</p>
      </div>
      <div id="convert-body" style="display:none">
        <div class="card">
          <div style="font-size:18px;font-weight:700;margin-bottom:4px" id="convert-recipe-name"></div>
          <div style="font-size:13px;color:var(--text-light)" id="convert-recipe-servings"></div>
        </div>
        <div class="card">
          <div class="convert-tabs">
            <button class="convert-tab active" onclick="setConvertMode(0)">👥 人數倍數</button>
            <button class="convert-tab" onclick="setConvertMode(1)">⚖️ 目標重量</button>
            <button class="convert-tab" onclick="setConvertMode(2)">🥕 依食材</button>
          </div>
          <div id="mode-0">
            <label>目標人數</label>
            <input type="text" id="target-servings" placeholder="例如：6 或 1/2">
          </div>
          <div id="mode-1" style="display:none">
            <label>目標總重量（g）</label>
            <input type="text" id="target-weight" placeholder="例如：1000">
            <p style="font-size:12px;color:var(--text-light);margin-top:6px">⚠️ 只計算 g / kg / ml / L 單位的食材。若食材都是「個」「片」等，請改用「依食材」模式。</p>
          </div>
          <div id="mode-2" style="display:none">
            <div style="margin-bottom:10px"><label>選擇基準食材</label><select id="ref-ingredient"></select></div>
            <div><label>你有多少？</label><input type="text" id="ref-amount" placeholder="例如：500 或 1/2"></div>
          </div>
          <button class="btn btn-primary btn-full" style="margin-top:14px" onclick="doConvert()">計算換算結果</button>
        </div>
        <div id="convert-result" class="card" style="display:none">
          <div class="card-title">換算結果</div>
          <div id="result-list"></div>
        </div>
      </div>
    </div>

    <!-- SAVED PAGE -->
    <div class="page" id="page-saved">
      <div class="saved-toolbar">
        <button class="btn btn-outline btn-sm" onclick="showNewFolderModal()">📁 新增資料夾</button>
      </div>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div id="saved-list"><div class="loading">載入中…</div></div>
    </div>

    <!-- SETTINGS PAGE -->
    <div class="page" id="page-settings">
      <div class="settings-section">
        <div class="settings-section-title">🎨 頁面背景設定</div>
        <div id="bg-settings-list"></div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">👤 帳號設定</div>
        <div class="bg-setting-card">
          <button class="btn btn-danger btn-full" onclick="showLogout()">登出帳號</button>
        </div>
      </div>
    </div>

  </div><!-- end page-content -->

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-edit" onclick="switchPage('edit')"><span class="nav-icon">✏️</span><span class="nav-label">編輯</span></button>
    <button class="nav-btn" id="nav-convert" onclick="switchPage('convert')"><span class="nav-icon">⚖️</span><span class="nav-label">轉換</span></button>
    <button class="nav-btn" id="nav-saved" onclick="switchPage('saved')"><span class="nav-icon">📚</span><span class="nav-label">已儲存</span></button>
    <button class="nav-btn" id="nav-settings" onclick="switchPage('settings')"><span class="nav-icon">⚙️</span><span class="nav-label">設定</span></button>
  </nav>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="logout-modal">
  <div class="modal">
    <div class="modal-title">登出帳號</div>
    <p style="text-align:center;color:var(--text-light);font-size:14px;margin-bottom:4px">確定要登出嗎？</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('logout-modal')">取消</button>
      <button class="btn btn-danger" onclick="doLogout()">確定登出</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="cover-modal">
  <div class="modal">
    <div class="modal-title">設定封面照片</div>
    <div style="margin-bottom:14px"><label>📷 從相簿選取</label><input type="file" id="cover-file" accept="image/*" onchange="onCoverFile(event)" style="padding:8px"></div>
    <div style="margin-bottom:14px"><label>🔗 圖片網址</label><input type="url" id="cover-url" placeholder="https://..."></div>
    <div id="cover-preview" style="width:100%;height:120px;border-radius:10px;border:1.5px solid var(--border);background:#f8f6f3;background-size:cover;background-position:center;margin-bottom:14px"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('cover-modal')">取消</button>
      <button class="btn btn-danger btn-sm" onclick="clearCover()" style="flex:none;padding:12px">🗑</button>
      <button class="btn btn-primary" onclick="applyCover()">套用</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="new-folder-modal">
  <div class="modal">
    <div class="modal-title">新增資料夾</div>
    <input type="text" id="new-folder-name" placeholder="資料夾名稱" onkeydown="if(event.key==='Enter')createFolder()">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('new-folder-modal')">取消</button>
      <button class="btn btn-primary" onclick="createFolder()">建立</button>

function parseFraction(s){
  if(!s)return NaN;s=String(s).trim();
  const u={'½':.5,'⅓':1/3,'⅔':2/3,'¼':.25,'¾':.75,'⅛':.125,'⅜':.375,'⅝':.625,'⅞':.875};
  if(u[s])return u[s];
  let m=s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if(m)return+m[1]+(+m[2])/(+m[3]);
  m=s.match(/^(\d+)\/(\d+)$/);
  if(m)return(+m[1])/(+m[2]);
  return parseFloat(s);
}
function fmtNum(n){if(isNaN(n))return'?';if(n===Math.floor(n))return String(n);return parseFloat(n.toFixed(2)).toString();}

  loginSuccess(data);
}

async function hashPw(password){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(password+'recipe_salt_2024'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function setConvertMode(mode){

  document.querySelectorAll('.convert-tab').forEach((b,i)=>b.classList.toggle('active',i===mode));

}

function doConvert(){
  const ings=currentRecipe.ingredients;if(!ings.length)return;
  let ratio=1;const orig=parseFraction(currentRecipe.servings)||1;
  if(convertMode===0){
    const servStr=currentRecipe.servings?currentRecipe.servings.trim():'';
    if(!servStr){showToast('此食譜尚未設定人數，請先到編輯頁面填寫份量');return;}
    const t=parseFraction(document.getElementById('target-servings').value);
    if(!document.getElementById('target-servings').value.trim()){showToast('請輸入目標人數');return;}
    if(isNaN(t)||t<=0){showToast('請輸入有效人數');return;}
    ratio=t/orig;}
  else if(convertMode===1){const tw=parseFraction(document.getElementById('target-weight').value);if(isNaN(tw)||tw<=0){showToast('請輸入有效重量');return;}const wu=['g','kg','ml','L'];let tot=0;ings.forEach(ing=>{if(wu.includes(ing.unit)){let q=parseFraction(ing.qty)||0;if(ing.unit==='kg'||ing.unit==='L')q*=1000;tot+=q;}});if(tot<=0){showToast('⚠️ 此模式只計算 g/kg/ml/L 單位的食材，「個」「片」等單位請改用「依食材」模式');return;}ratio=tw/tot;}
  else{const ri=parseInt(document.getElementById('ref-ingredient').value);const ra=parseFraction(document.getElementById('ref-amount').value);const ro=parseFraction(ings[ri].qty);if(isNaN(ra)||ra<=0||isNaN(ro)||ro<=0){showToast('請輸入有效份量');return;}ratio=ra/ro;}
  const rl=document.getElementById('result-list');rl.innerHTML='';
  ings.forEach((ing,i)=>{
    const oq=parseFraction(ing.qty);const nq=isNaN(oq)?'?':fmtNum(oq*ratio);
    const isRef=convertMode===2&&i===parseInt(document.getElementById('ref-ingredient').value);
    const row=document.createElement('div');row.className='result-row';
    row.innerHTML=`<span class="result-name">${ing.name||'食材'+(i+1)}${isRef?'<span class="badge-ref">基準</span>':''}</span><span class="result-orig">${ing.qty}${ing.unit}</span><span class="result-new">→ ${nq}${ing.unit}</span>`;
    rl.appendChild(row);
  });
  document.getElementById('convert-result').style.display='';
}

function applyPageBg(pageKey){
  const setting=bgSettings[pageKey];
  let el;

  else el=document.getElementById('page-'+pageKey);
  if(!el)return;
  if(!setting||setting.type==='none'){el.style.backgroundColor='';el.style.backgroundImage='';}
  else if(setting.type==='color'){el.style.backgroundColor=setting.value;el.style.backgroundImage='';}
  else if(setting.type==='image'){el.style.backgroundImage=`url(${setting.value})`;el.style.backgroundSize='cover';el.style.backgroundPosition='center';el.style.backgroundColor='';}
}

function renderBgSettings(){
  const container=document.getElementById('bg-settings-list');container.innerHTML='';
  BG_PAGES.forEach(page=>{
    const setting=bgSettings[page.key]||{type:'none',value:''};
    const previewStyle=setting.type==='color'?`background-color:${setting.value}`:setting.type==='image'?`background-image:url(${setting.value});background-size:cover;background-position:center`:'background:linear-gradient(135deg,#f8f6f3,#e0dcd8)';
    const card=document.createElement('div');card.className='bg-setting-card';
    card.innerHTML=`
      <div class="bg-setting-header"><span class="bg-page-icon">${page.icon}</span><span class="bg-page-name">${page.name}</span></div>
      <div class="bg-type-tabs">
        <button class="bg-type-btn${setting.type==='none'?' active':''}" onclick="setBgType('${page.key}','none')">無背景</button>
        <button class="bg-type-btn${setting.type==='color'?' active':''}" onclick="setBgType('${page.key}','color')">純色</button>
        <button class="bg-type-btn${setting.type==='image'?' active':''}" onclick="setBgType('${page.key}','image')">圖片</button>
      </div>
      <div id="bg-color-row-${page.key}" style="display:${setting.type==='color'?'block':'none'}">
        <label style="font-size:12px;margin-bottom:4px">選擇顏色</label>
        <input type="color" value="${setting.type==='color'?setting.value:'#f8f6f3'}" oninput="setBgColor('${page.key}',this.value)" style="width:100%;height:44px">
      </div>
      <div id="bg-img-row-${page.key}" style="display:${setting.type==='image'?'block':'none'}">
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="showBgImgModal('${page.key}')">📷 選取圖片</button>
          ${setting.type==='image'&&setting.value?`<button class="btn btn-ghost btn-sm" onclick="clearBgImg('${page.key}')">🗑 清除</button>`:''}
        </div>
      </div>
      <div class="bg-preview" id="bg-preview-${page.key}" style="${previewStyle}"></div>`;
    container.appendChild(card);
  });
}

function setBgType(pageKey,type){
  if(!bgSettings[pageKey])bgSettings[pageKey]={type:'none',value:''};
  bgSettings[pageKey].type=type;
  if(type==='none')bgSettings[pageKey].value='';
  saveBgSettings();applyPageBg(pageKey);renderBgSettings();
}

function setBgColor(pageKey,color){
  if(!bgSettings[pageKey])bgSettings[pageKey]={};
  bgSettings[pageKey].type='color';bgSettings[pageKey].value=color;
  saveBgSettings();applyPageBg(pageKey);
  const prev=document.getElementById('bg-preview-'+pageKey);
  if(prev){prev.style.backgroundColor=color;prev.style.backgroundImage='';}
}

function showBgImgModal(pageKey){
  bgEditTarget=pageKey;bgImgDataUrl='';
  document.getElementById('bg-file-input').value='';
  document.getElementById('bg-url-input').value='';
  const setting=bgSettings[pageKey];
  const preview=document.getElementById('bg-img-preview');
  if(setting&&setting.type==='image'&&setting.value)preview.style.backgroundImage=`url(${setting.value})`;
  else preview.style.backgroundImage='';
  openModal('bg-img-modal');
}

function onBgFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=ev=>{bgImgDataUrl=ev.target.result;document.getElementById('bg-img-preview').style.backgroundImage=`url(${bgImgDataUrl})`;};r.readAsDataURL(file);
}

function applyBgImg(){
  const url=document.getElementById('bg-url-input').value.trim();
  const val=url||bgImgDataUrl;
  if(!val){showToast('請選擇圖片或輸入網址');return;}
  if(!bgSettings[bgEditTarget])bgSettings[bgEditTarget]={};
  bgSettings[bgEditTarget].type='image';bgSettings[bgEditTarget].value=val;
  bgImgDataUrl='';
  saveBgSettings();applyPageBg(bgEditTarget);closeModal('bg-img-modal');renderBgSettings();
}

function clearBgImg(pageKey){
  if(bgSettings[pageKey]){bgSettings[pageKey].type='none';bgSettings[pageKey].value='';}
  saveBgSettings();applyPageBg(pageKey);renderBgSettings();
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  loadAuthScreen();
  addIngredient();
  document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show');});});
});
</script>
</body>
</html>
